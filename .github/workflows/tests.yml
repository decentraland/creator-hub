name: Tests
on: [ workflow_call ]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup
        with:
          cache-protoc: 'true'

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Reuse the shared build instead of regenerating protoc / rebuilding asset-packs.
      - uses: ./.github/actions/download-build

      - name: test
        run: make test

  # Inspector E2E is Playwright driving Chromium against the built bundle served
  # over http (no Electron). It renders a Babylon (WebGL) scene, which needs real
  # hardware GL — Linux runners have no GPU and software WebGL (SwiftShader) leaves
  # the canvas unpainted, so it runs on macOS. It's still its own job (separate
  # from the Electron suite) so the two heavy suites don't starve each other of
  # memory — the isolation that fixed the original flakiness.
  e2e-inspector:
    needs: unit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup
        with:
          cache-playwright: 'true'

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install

      # Reuse the shared build; the inspector server below serves the prebuilt bundle.
      - uses: ./.github/actions/download-build

      - name: cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ${{ runner.os == 'Linux' && '~/.cache/ms-playwright' || runner.os == 'macOS' && '~/Library/Caches/ms-playwright' || '~\AppData\Local\ms-playwright' }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: install Playwright browsers
        run: npx playwright install

      - name: start inspector server
        shell: bash
        run: |
          cd packages/inspector
          npx http-server public -p 8000 --cors -a localhost &
          sleep 5

      # Whole-suite retry as a machine-level backstop: shared runners can be
      # slow/contended in ways no timeout tuning fully absorbs. A re-run is clean
      # (fresh forked processes + fresh browser per spec file; the data layer is
      # in-page; http-server stays up across attempts), and a real regression
      # still fails both attempts — with the e2e diagnostics printed each time.
      - name: e2e
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_on: error
          shell: 'bash'
          command: make test-inspector-e2e
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          E2E_CONTENT_URL: https://builder-items.decentraland.zone

      # Diagnostics for the flaky "app never becomes visible" failure.
      - name: upload e2e diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: inspector-e2e-diagnostics
          path: packages/inspector/test-results
          if-no-files-found: ignore
          retention-days: 3

  # Creator Hub E2E cold-launches the real Electron app (Playwright _electron),
  # so it must run on macOS. It reuses the prebuilt creator-hub dist and launches
  # via test:e2e:ci (no rebuild). _electron drives the app's own Chromium, so no
  # Playwright browser download is needed here.
  e2e-creator-hub:
    needs: unit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - uses: ./.github/actions/download-build
        with:
          include-creator-hub: 'true'

      - name: e2e
        run: make test-creator-hub-e2e-ci
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          E2E_CONTENT_URL: https://builder-items.decentraland.zone
