name: Tests
on: [ workflow_call ]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup
        with:
          cache-protoc: 'true'

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Reuse the shared build instead of regenerating protoc / rebuilding asset-packs.
      - uses: ./.github/actions/download-build

      - name: test
        run: make test

  E2E:
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest] #[ macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup
        with:
          cache-playwright: 'true'

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install

      - name: cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Linux' && '~/.cache/ms-playwright' || runner.os == 'macOS' && '~/Library/Caches/ms-playwright' || '~\AppData\Local\ms-playwright' }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: install Playwright browsers
        run: npx playwright install

      # Reuse the shared build: the inspector server below serves the prebuilt
      # bundle, and test-e2e-ci launches the prebuilt creator-hub app — so
      # nothing is rebuilt on this (macOS) runner. include-creator-hub pulls the
      # extra creator-hub dist that only the E2E job needs.
      - uses: ./.github/actions/download-build
        with:
          include-creator-hub: 'true'

      - name: start inspector server
        shell: bash
        run: |
          cd packages/inspector
          npx http-server public -p 8000 --cors -a localhost &
          sleep 5

      - name: e2e
        run: make test-e2e-ci
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          E2E_CONTENT_URL: https://builder-items.decentraland.zone
