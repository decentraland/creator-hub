name: Typechecking
on: [ workflow_call ]

concurrency:
  group: typechecking-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  typescript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
        id: setup
        with:
          cache-protoc: 'true'

      - name: install
        if: steps.setup.outputs.node-modules-cache-hit != 'true'
        run: make install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Reuse the shared build (proto gen + asset-packs + inspector dist)
      # instead of regenerating protoc and rebuilding asset-packs here.
      - uses: ./.github/actions/download-build

      - run: npm run typecheck --if-present
